<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS Material Manager</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

:root{
    --primary:#1a73e8;
}

body{
    margin:0;
    padding:10px;
    background:#f1f5f9;
    font-family:Segoe UI,sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    background:linear-gradient(135deg,#1a73e8,#0d47a1);
    color:white;
    padding:25px;
    text-align:center;
}

.card{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    border:1px solid #ddd;
}

input,select,button{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    border:none;
    background:#1a73e8;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.flex{
    display:flex;
    gap:10px;
}

.hidden{
    display:none;
}

.summary{
    margin:15px;
    padding:20px;
    border-radius:15px;
    background:#e8f0fe;
    text-align:center;
}

.summary h2{
    margin:0;
    color:#0d47a1;
}

.area{
    background:#e3f2fd;
    color:#1565c0;
    padding:5px 12px;
    border-radius:20px;
    display:inline-block;
    margin-top:15px;
    font-size:12px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th{
    background:#f1f3f4;
    padding:10px;
    text-align:left;
    font-size:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.preview{
    width:80px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

#loading{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

</style>
</head>

<body>

<div id="loading">
    <i class="fas fa-spinner fa-spin fa-3x"></i>
    <p>Uploading Photo...</p>
</div>

<div class="container">

<div class="header">
    <h1>GS MATERIAL MANAGER</h1>
</div>

<div id="login-section" class="card" style="text-align:center;">
    <button onclick="login()">
        <i class="fab fa-google"></i>
        Login with Google
    </button>
</div>

<div id="main" class="hidden">

<div class="card">
    <input type="text" id="site-name" placeholder="Site Name">
</div>

<div class="summary">
    <div>Total Weight</div>
    <h2 id="grand-total">0.00 KG</h2>
</div>

<div class="card">

<h3>Material Entry</h3>

<input type="date" id="mat-date">

<div class="flex">
    <input type="text" id="mat-area" placeholder="Area">
    
    <select id="mat-direction">
        <option value="">Direction</option>
        <option>North</option>
        <option>South</option>
        <option>East</option>
        <option>West</option>
    </select>
</div>

<select id="mat-type" onchange="togglePlate()">

<option value="46" data-type="linear">
ISMB 300 (46 kg/m)
</option>

<option value="22.3" data-type="linear">
ISMC 200 (22.3 kg/m)
</option>

<option value="11" data-type="linear">
ISA 75 (11 kg/m)
</option>

<option value="78.5" data-type="plate">
10mm Plate
</option>

</select>

<div id="plate-div" class="hidden">
    <input type="number" id="mat-width" placeholder="Width in MM">
</div>

<div class="flex">
    <input type="number" id="mat-length" placeholder="Length in MM">
    <input type="number" id="mat-qty" placeholder="Qty" value="1">
</div>

<input type="file" id="mat-photo" accept="image/*">

<button onclick="saveMaterial()">
Save Material
</button>

</div>

<div class="card">

<h3>Material Log</h3>

<div id="material-list"></div>

<button onclick="generatePDF()" style="background:#0f9d58;">
Export PDF
</button>

</div>

</div>

</div>

<script>

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js');
}

const firebaseConfig = {
    apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
    authDomain: "gsconstructions-3f4c9.firebaseapp.com",
    projectId: "gsconstructions-3f4c9",
    storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
    messagingSenderId: "622430516475",
    appId: "1:622430516475:web:17fd96908472cbd665ec5e"
};

const IMGBB_API_KEY =
"b48c7ab06cc8ad41b1ec1188653de8be";

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const provider =
new firebase.auth.GoogleAuthProvider();

let materials = [];

function login(){
    auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{

    if(user){

        document.getElementById('login-section')
        .classList.add('hidden');

        document.getElementById('main')
        .classList.remove('hidden');

        document.getElementById('mat-date').value =
        new Date().toISOString().split('T')[0];

        loadMaterials();
    }

});

function formatDate(dateStr){

    const months = [
        "January","February","March","April",
        "May","June","July","August",
        "September","October","November","December"
    ];

    const p = dateStr.split("-");

    return `${p[2]} ${months[p[1]-1]} ${p[0]}`;
}

function togglePlate(){

    const sel = document.getElementById('mat-type');

    const isPlate =
    sel.options[sel.selectedIndex]
    .dataset.type === "plate";

    document.getElementById('plate-div')
    .classList.toggle('hidden',!isPlate);
}

async function uploadImage(file){

    document.getElementById('loading').style.display =
    "flex";

    let formData = new FormData();

    formData.append("image",file);

    const res = await fetch(
    `https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,
    {
        method:'POST',
        body:formData
    });

    const data = await res.json();

    document.getElementById('loading').style.display =
    "none";

    return data.data.url;
}

async function saveMaterial(){

    const date =
    document.getElementById('mat-date').value;

    const area =
    document.getElementById('mat-area').value;

    const direction =
    document.getElementById('mat-direction').value;

    const sel =
    document.getElementById('mat-type');

    const length =
    parseFloat(
    document.getElementById('mat-length').value
    );

    const qty =
    parseFloat(
    document.getElementById('mat-qty').value
    ) || 1;

    const file =
    document.getElementById('mat-photo').files[0];

    if(!date || !area || !length){
        alert("Fill all fields");
        return;
    }

    let photo = "";

    if(file){
        photo = await uploadImage(file);
    }

    let weight = 0;
    let size = "";

    if(sel.options[sel.selectedIndex]
    .dataset.type === "plate"){

        const width =
        parseFloat(
        document.getElementById('mat-width').value
        );

        weight =
        ((length/1000)*(width/1000)
        *parseFloat(sel.value))*qty;

        size = length + "x" + width + " mm";

    }else{

        weight =
        ((length/1000)
        *parseFloat(sel.value))*qty;

        size = length + " mm";
    }

    await db.collection('materials').add({

        date,
        area,
        direction,
        name:sel.options[sel.selectedIndex].text,
        size,
        qty,
        weight:parseFloat(weight.toFixed(2)),
        photo,
        uid:auth.currentUser.uid,
        ts:Date.now()

    });

    loadMaterials();
}

async function loadMaterials(){

    const snap =
    await db.collection('materials')
    .where('uid','==',auth.currentUser.uid)
    .get();

    materials = [];

    snap.forEach(doc=>{

        materials.push({
            id:doc.id,
            ...doc.data()
        });

    });

    renderMaterials();
}

function renderMaterials(){

    let total = 0;

    const grouped = {};

    materials.forEach(m=>{

        total += m.weight;

        if(!grouped[m.area]){
            grouped[m.area] = [];
        }

        grouped[m.area].push(m);

    });

    document.getElementById('grand-total')
    .innerText = total.toFixed(2) + " KG";

    let html = "";

    Object.keys(grouped).forEach(area=>{

        html += `
        <div class="area">${area}</div>

        <table>

        <tr>
        <th>Material</th>
        <th>Weight</th>
        <th>Photo</th>
        </tr>
        `;

        grouped[area].forEach(m=>{

            html += `
            <tr>

            <td>
            <b>${m.name}</b><br>
            ${formatDate(m.date)}
            </td>

            <td>${m.weight} KG</td>

            <td>
            ${m.photo ?
            `<img src="${m.photo}" class="preview">`
            : '-'}
            </td>

            </tr>
            `;
        });

        html += `</table>`;
    });

    document.getElementById('material-list')
    .innerHTML = html;
}

async function getBase64FromUrl(url){

    const data = await fetch(url);

    const blob = await data.blob();

    return new Promise(resolve=>{

        const reader = new FileReader();

        reader.readAsDataURL(blob);

        reader.onloadend = ()=>{
            resolve(reader.result);
        };

    });
}

async function generatePDF(){

    if(materials.length===0){
        alert("No Data");
        return;
    }

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    const site =
    document.getElementById('site-name').value
    || "Project";

    doc.setFontSize(20);

    doc.text(
        "GS MATERIAL REPORT",
        14,
        20
    );

    doc.setFontSize(12);

    doc.text(
        "Project : " + site,
        14,
        30
    );

    let y = 40;

    let total = 0;

    const grouped = {};

    materials.forEach(m=>{

        total += m.weight;

        if(!grouped[m.area]){
            grouped[m.area] = [];
        }

        grouped[m.area].push(m);

    });

    for(const area in grouped){

        doc.setFontSize(14);

        doc.text(
            "AREA : " + area,
            14,
            y
        );

        y += 10;

        for(const m of grouped[area]){

            if(y > 250){
                doc.addPage();
                y = 20;
            }

            doc.setFontSize(11);

            doc.text(
            `Date : ${formatDate(m.date)}`,
            14,
            y
            );

            y += 6;

            doc.text(
            `Material : ${m.name}`,
            14,
            y
            );

            y += 6;

            doc.text(
            `Size : ${m.size}`,
            14,
            y
            );

            y += 6;

            doc.text(
            `Qty : ${m.qty}`,
            14,
            y
            );

            y += 6;

            doc.text(
            `Weight : ${m.weight} KG`,
            14,
            y
            );

            y += 8;

            if(m.photo){

                try{

                    const imgData =
                    await getBase64FromUrl(m.photo);

                    doc.addImage(
                        imgData,
                        'JPEG',
                        14,
                        y,
                        50,
                        40
                    );

                    y += 45;

                }catch(e){

                    doc.text(
                    "Photo Failed",
                    14,
                    y
                    );

                    y += 10;
                }

            }

            y += 10;
        }

    }

    doc.setFontSize(15);

    doc.text(
    "TOTAL WEIGHT : " +
    total.toFixed(2) + " KG",
    14,
    y
    );

    doc.save(site + "_Report.pdf");
}

</script>

</body>
</html>
