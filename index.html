<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Log Manager</title>
    
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4021/4021708.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; flex: 1; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 25px; text-align: center; }
        .site-banner { background: #fffde7; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; color: #f57f17; border-bottom: 3px solid #fbc02d; text-transform: uppercase; letter-spacing: 1px; }
        .section-card { margin: 15px; padding: 20px; border-radius: 15px; background: #fff; border: 1px solid #e0e0e0; position: relative; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; outline: none; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button:active { transform: scale(0.97); }
        .btn-main { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .summary-card { background: linear-gradient(135deg, #e3f2fd, #bbdefb); margin: 15px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); }
        .total-label { font-size: 14px; font-weight: bold; color: #1565c0; }
        .total-value { font-size: 26px; font-weight: bold; color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 12px; color: #70757a; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-circle { width: 36px; height: 36px; border-radius: 50%; padding: 0; display: inline-flex; }
        .area-badge { background: #e8f0fe; color: #1a73e8; padding: 5px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; display: inline-block; margin-top: 15px; border: 1px solid #1a73e8; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .footer-credit { text-align: center; padding: 20px; font-size: 12px; color: #70757a; font-weight: bold; letter-spacing: 1px; }
        .photo-link { color: #1a73e8; text-decoration: none; font-size: 11px; font-weight: bold; display: block; margin-top: 5px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary);"></i>
    <p id="loading-text" style="margin-top: 10px; font-weight: bold;">Processing... Please wait</p>
</div>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-boxes"></i> MATERIAL MANAGER</h1>
    </div>

    <div id="login-section" style="padding: 100px 20px; text-align: center;">
        <button class="btn-main" onclick="login()" style="width: auto; padding: 15px 45px; font-size: 18px; border-radius: 50px;"><i class="fab fa-google"></i> Login to Manager</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="site-banner" id="site-header-text">NO SITE SELECTED</div>

        <div style="padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #eceff1; border-bottom: 1px solid #cfd8dc;">
            <span id="user-display" style="font-size: 13px; font-weight: bold; color: #455a64;"></span>
            <button onclick="logout()" class="btn-red" style="width: auto; padding: 5px 12px; margin: 0; font-size: 11px; border-radius: 5px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="summary-card">
            <div class="total-label"><i class="fas fa-weight-hanging"></i> TOTAL WEIGHT</div>
            <div class="total-value" id="grand-total">0.00 KG</div>
        </div>

        <div class="section-card">
            <input type="text" id="site-name-input" placeholder="Project Name..." style="border: 2px solid var(--primary); text-align: center; font-weight: bold;" oninput="updateSiteName()">
        </div>

        <div class="section-card" style="border-top: 4px solid var(--primary);">
            <div class="section-title"><i class="fas fa-plus"></i> New Material</div>
            <input type="date" id="mat-date">
            <div class="flex-row">
                <input type="text" id="mat-area" placeholder="Area (e.g. Tank 1)">
                <select id="mat-direction">
                    <option value="">Direction</option>
                    <option value="North">North</option><option value="South">South</option>
                    <option value="East">East</option><option value="West">West</option>
                </select>
            </div>
            <div style="background: #f1f3f4; padding: 10px; border-radius: 10px; margin-bottom: 8px;">
                <input type="file" id="mat-photo" accept="image/*" style="padding: 5px; font-size: 12px;">
            </div>
            <select id="mat-type" onchange="togglePlateInput()">
                <optgroup label="Beams"><option value="46" data-type="linear">ISMB 300 (46 kg/m)</option></optgroup>
                <optgroup label="Channels"><option value="22.3" data-type="linear">ISMC 200 (22.3 kg/m)</option></optgroup>
                <optgroup label="Plates"><option value="78.5" data-type="plate">10mm Plate (78.5 kg/sq.m)</option></optgroup>
            </select>
            <div id="plate-width-div" class="hidden"><input type="number" id="mat-width" placeholder="Width (MM)"></div>
            <div class="flex-row">
                <input type="number" id="mat-length" placeholder="Length (MM)">
                <input type="number" id="mat-qty" placeholder="Qty" value="1">
            </div>
            <button id="mat-action-btn" class="btn-main" onclick="processMaterial()"><i class="fas fa-save"></i> Save Material</button>
            
            <div id="mat-grouped-display" style="margin-top: 15px;"></div>
            
            <button class="btn-main" onclick="generateMaterialPDF()" style="margin-top: 15px; background: var(--dark);"><i class="fas fa-file-pdf"></i> Export Report</button>
        </div>
    </div>
</div>

<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
        });
    }

    const firebaseConfig = {
        apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
        authDomain: "gsconstructions-3f4c9.firebaseapp.com",
        projectId: "gsconstructions-3f4c9",
        storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
        messagingSenderId: "622430516475",
        appId: "1:622430516475:web:17fd96908472cbd665ec5e"
    };

    const IMGBB_API_KEY = "b48c7ab06cc8ad41b1ec1188653de8be";
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentEditMatId = null;
    let localMaterials = [];

    function login() { auth.signInWithPopup(provider); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.displayName;
            document.getElementById('mat-date').value = new Date().toISOString().split('T')[0];
            refreshUI();
        }
    });

    async function uploadToImgBB(file) {
        let formData = new FormData();
        formData.append("image", file);
        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
            const result = await response.json();
            return result.data.url;
        } catch (error) {
            console.error("Upload failed", error);
            return "";
        }
    }

    async function processMaterial() {
        const date = document.getElementById('mat-date').value;
        const area = document.getElementById('mat-area').value || "General";
        const dir = document.getElementById('mat-direction').value || "-";
        const sel = document.getElementById('mat-type');
        const length = parseFloat(document.getElementById('mat-length').value);
        const qty = parseFloat(document.getElementById('mat-qty').value) || 1;
        const photoFile = document.getElementById('mat-photo').files[0];

        if(!length || !date) return alert("Fill mandatory fields!");

        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('loading-text').innerText = "Saving...";

        let photoUrl = "";
        if(photoFile) photoUrl = await uploadToImgBB(photoFile);

        let unitWeight = 0, sizeText = "";
        if(sel.options[sel.selectedIndex].getAttribute('data-type') === 'plate') {
            const width = parseFloat(document.getElementById('mat-width').value);
            if(!width) { alert("Enter width!"); return; }
            unitWeight = (length/1000) * (width/1000) * parseFloat(sel.value);
            sizeText = `${length}x${width}mm`;
        } else {
            unitWeight = (length/1000) * parseFloat(sel.value);
            sizeText = `${length}mm`;
        }

        const data = {
            date, area, direction: dir, name: sel.options[sel.selectedIndex].text,
            size: sizeText, qty, weight: parseFloat((unitWeight * qty).toFixed(2)),
            photoUrl: photoUrl, uid: auth.currentUser.uid, ts: Date.now()
        };

        try {
            if(currentEditMatId) {
                if(!photoFile) {
                    const old = localMaterials.find(m => m.id === currentEditMatId);
                    if(old) data.photoUrl = old.photoUrl;
                }
                await db.collection('materials').doc(currentEditMatId).update(data);
                currentEditMatId = null;
            } else {
                await db.collection('materials').add(data);
            }
            document.getElementById('mat-length').value = "";
            document.getElementById('mat-photo').value = "";
            refreshUI();
        } catch (e) { alert("Error: " + e.message); }
        finally { document.getElementById('loading-overlay').style.display = 'none'; }
    }

    async function refreshUI() {
        if(!auth.currentUser) return;
        const uid = auth.currentUser.uid;
        document.getElementById('site-name-input').value = localStorage.getItem('gs_pro_site') || "";
        updateSiteName();

        const snap = await db.collection('materials').where('uid', '==', uid).orderBy('ts','desc').get();
        let totalW = 0, groups = {};
        localMaterials = [];

        snap.forEach(doc => {
            const d = doc.data();
            const entry = {id: doc.id, ...d};
            localMaterials.push(entry);
            if(!groups[d.area]) groups[d.area] = [];
            groups[d.area].push(entry);
            totalW += d.weight;
        });

        let html = '';
        Object.keys(groups).sort().forEach(a => {
            html += `<div class="area-badge"><i class="fas fa-map-marker-alt"></i> ${a}</div><table>`;
            groups[a].forEach(d => {
                html += `<tr><td><b>${d.name}</b><br>${d.direction} (${d.date}) ${d.photoUrl ? `<a href="${d.photoUrl}" target="_blank">Photo</a>` : ''}</td>
                <td>${d.size}<br>x${d.qty}</td><td>${d.weight}kg</td>
                <td><button onclick="editItem('${d.id}')">✏️</button></td></tr>`;
            });
            html += `</table>`;
        });
        document.getElementById('mat-grouped-display').innerHTML = html;
        document.getElementById('grand-total').innerText = totalW.toFixed(2) + " KG";
    }

    function updateSiteName() {
        const val = document.getElementById('site-name-input').value;
        document.getElementById('site-header-text').innerText = val || "NO SITE SELECTED";
        localStorage.setItem('gs_pro_site', val);
    }

    function togglePlateInput() {
        const isPlate = document.getElementById('mat-type').options[document.getElementById('mat-type').selectedIndex].getAttribute('data-type') === 'plate';
        document.getElementById('plate-width-div').classList.toggle('hidden', !isPlate);
    }

    function editItem(id) {
        const d = localMaterials.find(m => m.id === id);
        if(!d) return;
        currentEditMatId = id;
        document.getElementById('mat-date').value = d.date;
        document.getElementById('mat-area').value = d.area;
        document.getElementById('mat-length').value = d.size.split('mm')[0].split('x')[0];
        document.getElementById('mat-qty').value = d.qty;
        window.scrollTo(0,0);
    }

    function generateMaterialPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const site = document.getElementById('site-name-input').value || "Project";
        
        doc.setFontSize(16); doc.text("MATERIAL REPORT: " + site, 14, 15);
        
        let y = 25;
        const groups = {};
        localMaterials.forEach(m => {
            if(!groups[m.area]) groups[m.area] = [];
            groups[m.area].push([m.date, m.name, m.size, m.qty, m.weight + "kg"]);
        });

        Object.keys(groups).forEach(area => {
            doc.setFontSize(12); doc.text("Area: " + area, 14, y);
            doc.autoTable({ startY: y + 2, head: [['Date', 'Item', 'Size', 'Qty', 'Weight']], body: groups[area] });
            y = doc.lastAutoTable.finalY + 10;
        });

        doc.setFontSize(14); doc.text("Grand Total: " + document.getElementById('grand-total').innerText, 14, y + 5);
        doc.save(site + "_Report.pdf");
    }
</script>
</body>
</html>
