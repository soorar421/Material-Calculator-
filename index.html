<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gs Material Manager</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<link rel="apple-touch-icon" href="icon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

:root{
    --primary:#1a73e8;
    --dark:#202124;
    --green:#0f9d58;
    --danger:#d93025;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:10px;
    background:#f1f5f9;
    font-family:Segoe UI,sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    background:linear-gradient(135deg,#1a73e8,#0d47a1);
    color:white;
    padding:25px;
    text-align:center;
}

.site-banner{
    background:#fff8e1;
    color:#f57f17;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    padding:15px;
    border-bottom:3px solid #fbc02d;
}

.section{
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    border:1px solid #ddd;
    padding:20px;
    margin-bottom:15px;
}

.title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
    color:var(--primary);
}

input,select,button{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.btn{
    background:var(--primary);
    color:white;
}

.btn-red{
    background:var(--danger);
    color:white;
}

.summary{
    background:#e8f0fe;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    text-align:center;
}

.summary h2{
    margin:0;
    color:#0d47a1;
    font-size:30px;
}

.area-badge{
    display:inline-block;
    background:#e3f2fd;
    color:#1565c0;
    padding:5px 12px;
    border-radius:30px;
    font-size:12px;
    font-weight:bold;
    margin-top:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th{
    background:#f1f3f4;
    padding:10px;
    text-align:left;
    font-size:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

img.preview{
    width:80px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
    border:1px solid #ddd;
}

.flex{
    display:flex;
    gap:10px;
}

.hidden{
    display:none;
}

.footer{
    text-align:center;
    font-size:12px;
    color:#666;
    padding:20px;
}

#loading{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.8);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    flex-direction:column;
}

</style>
</head>

<body>

<div id="loading">
    <i class="fas fa-spinner fa-spin fa-3x" style="color:#1a73e8;"></i>
    <p>Uploading Photo...</p>
</div>

<div class="container">

<div class="header">
    <h1><i class="fas fa-industry"></i> GS MATERIAL MANAGER</h1>
</div>

<div id="login-section" class="section" style="text-align:center;padding:80px 20px;">
    <button class="btn" onclick="login()" style="max-width:300px;">
        <i class="fab fa-google"></i> Login with Google
    </button>
</div>

<div id="main" class="hidden">

<div class="site-banner" id="site-title">
    NO SITE SELECTED
</div>

<div class="section">

<div class="card">
    <input type="text" id="site-name" placeholder="Enter Site Name" oninput="updateSite()">
</div>

<div class="summary">
    <div>Total Material Weight</div>
    <h2 id="grand-total">0.00 KG</h2>
</div>

<div class="card">

<div class="title">
    <i class="fas fa-box"></i> Material Entry
</div>

<input type="date" id="mat-date">

<div class="flex">
    <input type="text" id="mat-area" placeholder="Area Name">
    
    <select id="mat-direction">
        <option value="">Direction</option>
        <option>North</option>
        <option>South</option>
        <option>East</option>
        <option>West</option>
        <option>Center</option>
    </select>
</div>

<select id="mat-type" onchange="togglePlate()">

<optgroup label="Beams">
<option value="46" data-type="linear">ISMB 300 (46 kg/m)</option>
</optgroup>

<optgroup label="Channels">
<option value="22.3" data-type="linear">ISMC 200 (22.3 kg/m)</option>
<option value="16.8" data-type="linear">ISMC 150 (16.8 kg/m)</option>
</optgroup>

<optgroup label="Angles">
<option value="11" data-type="linear">ISA 75 (11 kg/m)</option>
<option value="4.5" data-type="linear">ISA 50 (4.5 kg/m)</option>
</optgroup>

<optgroup label="Plates">
<option value="78.5" data-type="plate">10mm Plate (78.5 kg/sq.m)</option>
</optgroup>

</select>

<div id="plate-div" class="hidden">
    <input type="number" id="mat-width" placeholder="Width in MM">
</div>

<div class="flex">
    <input type="number" id="mat-length" placeholder="Length in MM">
    <input type="number" id="mat-qty" placeholder="Qty" value="1">
</div>

<label style="font-size:13px;font-weight:bold;">
    Upload Photo
</label>

<input type="file" id="mat-photo" accept="image/*">

<button class="btn" onclick="saveMaterial()">
    <i class="fas fa-save"></i> Save Material
</button>

</div>

<div class="card">

<div class="title">
    <i class="fas fa-list"></i> Material Log
</div>

<div id="material-list"></div>

<button class="btn" onclick="generatePDF()" style="margin-top:20px;background:#0f9d58;">
    <i class="fas fa-file-pdf"></i> Export PDF
</button>

</div>

</div>

</div>

<div class="footer">
Designed by soorajrmaranadu
</div>

</div>

<script>

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js');
}

const firebaseConfig = {
    apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
    authDomain: "gsconstructions-3f4c9.firebaseapp.com",
    projectId: "gsconstructions-3f4c9",
    storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
    messagingSenderId: "622430516475",
    appId: "1:622430516475:web:17fd96908472cbd665ec5e"
};

const IMGBB_API_KEY = "b48c7ab06cc8ad41b1ec1188653de8be";

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let materials = [];

function login(){
    auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{

    if(user){

        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');

        document.getElementById('mat-date').value =
        new Date().toISOString().split('T')[0];

        document.getElementById('site-name').value =
        localStorage.getItem('site_name') || "";

        updateSite();

        loadMaterials();
    }

});

function updateSite(){

    const val = document.getElementById('site-name').value;

    document.getElementById('site-title').innerText =
    val || "NO SITE SELECTED";

    localStorage.setItem('site_name',val);
}

function formatDate(dateStr){

    const months = [
        "January","February","March","April",
        "May","June","July","August",
        "September","October","November","December"
    ];

    const parts = dateStr.split("-");

    const year = parts[0];
    const month = months[parseInt(parts[1]) - 1];
    const day = parts[2];

    return `${day} ${month} ${year}`;
}

function togglePlate(){

    const sel = document.getElementById('mat-type');

    const isPlate =
    sel.options[sel.selectedIndex].dataset.type === "plate";

    document.getElementById('plate-div')
    .classList.toggle('hidden',!isPlate);
}

async function uploadImage(file){

    document.getElementById('loading').style.display = "flex";

    let formData = new FormData();
    formData.append("image",file);

    const res = await fetch(
    `https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,
    {
        method:'POST',
        body:formData
    });

    const data = await res.json();

    document.getElementById('loading').style.display = "none";

    return data.data.url;
}

async function saveMaterial(){

    const date = document.getElementById('mat-date').value;
    const area = document.getElementById('mat-area').value;
    const direction = document.getElementById('mat-direction').value;

    const sel = document.getElementById('mat-type');

    const length =
    parseFloat(document.getElementById('mat-length').value);

    const qty =
    parseFloat(document.getElementById('mat-qty').value) || 1;

    const file =
    document.getElementById('mat-photo').files[0];

    if(!date || !area || !length){
        alert("Fill all fields");
        return;
    }

    let photo = "";

    if(file){
        photo = await uploadImage(file);
    }

    let weight = 0;
    let size = "";

    if(sel.options[sel.selectedIndex].dataset.type === "plate"){

        const width =
        parseFloat(document.getElementById('mat-width').value);

        weight =
        ((length/1000)*(width/1000)*parseFloat(sel.value))*qty;

        size = length + "x" + width + " mm";

    }else{

        weight =
        ((length/1000)*parseFloat(sel.value))*qty;

        size = length + " mm";
    }

    await db.collection('materials').add({

        date,
        area,
        direction,
        name:sel.options[sel.selectedIndex].text,
        size,
        qty,
        weight:parseFloat(weight.toFixed(2)),
        photo,
        uid:auth.currentUser.uid,
        ts:Date.now()

    });

    document.getElementById('mat-length').value="";
    document.getElementById('mat-width').value="";
    document.getElementById('mat-photo').value="";
    document.getElementById('mat-area').value="";
    document.getElementById('mat-qty').value="1";

    loadMaterials();
}

async function loadMaterials(){

    const snap = await db.collection('materials')
    .where('uid','==',auth.currentUser.uid)
    .get();

    materials = [];

    snap.forEach(doc=>{
        materials.push({
            id:doc.id,
            ...doc.data()
        });
    });

    renderMaterials();
}

function renderMaterials(){

    let total = 0;

    const grouped = {};

    materials.forEach(m=>{

        total += m.weight;

        if(!grouped[m.area]){
            grouped[m.area] = [];
        }

        grouped[m.area].push(m);

    });

    document.getElementById('grand-total').innerText =
    total.toFixed(2) + " KG";

    let html = "";

    Object.keys(grouped).sort().forEach(area=>{

        html += `
        <div class="area-badge">
            ${area}
        </div>

        <table>
        <thead>
        <tr>
        <th>Material</th>
        <th>Size</th>
        <th>Weight</th>
        <th>Photo</th>
        </tr>
        </thead>
        <tbody>
        `;

        grouped[area].forEach(m=>{

            html += `
            <tr>

            <td>
            <strong>${m.name}</strong><br>
            ${m.direction}<br>
            <small>${formatDate(m.date)}</small>
            </td>

            <td>
            ${m.size}<br>
            Qty:${m.qty}
            </td>

            <td>
            ${m.weight} KG
            </td>

            <td>
            ${m.photo ?
            `<a href="${m.photo}" target="_blank">
            <img src="${m.photo}" class="preview">
            </a>`
            : '-'}
            </td>

            </tr>
            `;
        });

        html += `</tbody></table>`;
    });

    document.getElementById('material-list').innerHTML = html;
}

function generatePDF(){

    if(materials.length===0){
        alert("No Data");
        return;
    }

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    const site =
    document.getElementById('site-name').value || "Project";

    doc.setFontSize(20);
    doc.text("GS MATERIAL REPORT",14,20);

    doc.setFontSize(11);
    doc.text("Project : " + site,14,28);

    let y = 40;

    const grouped = {};

    let grand = 0;

    materials.forEach(m=>{

        grand += m.weight;

        if(!grouped[m.area]){
            grouped[m.area] = [];
        }

        grouped[m.area].push([
            formatDate(m.date),
            m.direction,
            m.name,
            m.size,
            m.qty,
            m.weight + " KG"
        ]);
    });

    Object.keys(grouped).forEach(area=>{

        doc.setFontSize(13);
        doc.text("AREA : " + area,14,y);

        doc.autoTable({

            startY:y+3,

            head:[[
                'Date',
                'Direction',
                'Material',
                'Size',
                'Qty',
                'Weight'
            ]],

            body:grouped[area],

            theme:'grid',

            headStyles:{
                fillColor:[26,115,232]
            }

        });

        y = doc.lastAutoTable.finalY + 15;

    });

    doc.setFontSize(14);

    doc.text(
        "TOTAL WEIGHT : " + grand.toFixed(2) + " KG",
        14,
        y
    );

    doc.save(site + "_Material_Report.pdf");
}

</script>

</body>
</html>
