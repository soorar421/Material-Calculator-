<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Pro - Calculator & Share</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 20px; background: #fafafa; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; border-bottom: 4px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h4 { margin: 0; font-size: 0.8rem; color: #666; }
        .stat-card p { margin: 5px 0 0; font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        .input-form { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; border-bottom: 1px solid #eee; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #444; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-add { background: var(--success); color: white; margin-top: auto; }
        .btn-share { background: var(--accent); color: white; }
        .btn-download { background: var(--primary); color: white; }

        .table-box { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .actions { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1rem; }
        
        .export-zone { padding: 20px; background: #f9f9f9; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0"><i class="fas fa-balance-scale"></i> Steel Estimator Pro</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h4>Items</h4><p id="tCount">0</p></div>
        <div class="stat-card" style="border-color: var(--success)"><h4>Total Weight</h4><p><span id="tWeight">0.00</span> kg</p></div>
    </div>

    <div class="input-form">
        <div class="group">
            <label>Category</label>
            <select id="cat" onchange="loadSizes()">
                <option value="">Select</option>
                <option value="Beams">Beams</option>
                <option value="Channels">Channels</option>
                <option value="Angles">Angles</option>
                <option value="Flats">Flats</option>
                <option value="Plates">Plates</option>
            </select>
        </div>
        <div class="group">
            <label>Size</label>
            <select id="size"><option value="">Select Category</option></select>
        </div>
        <div class="group"><label>Length (mm)</label><input type="number" id="len" placeholder="0"></div>
        <div class="group"><label>Width (mm)</label><input type="number" id="wid" placeholder="0"></div>
        <div class="group"><label>Area (sq.m)</label><input type="number" id="are" placeholder="0.0"></div>
        <input type="hidden" id="editIdx" value="-1">
        <button class="btn btn-add" onclick="saveItem()"><i class="fas fa-save"></i> <span id="btnLbl">Save</span></button>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Weight</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <div class="export-zone">
        <button class="btn btn-share" onclick="handlePDF('ALL', 'share')"><i class="fas fa-share-nodes"></i> Share Full Report</button>
        <button class="btn btn-download" onclick="handlePDF('ALL', 'download')"><i class="fas fa-file-pdf"></i> Download All</button>
    </div>
</div>

<script>
    const dataRef = {
        "Beams": { "ISMB 300": 46 },
        "Channels": { "ISMC 200": 22.3, "ISMC 150": 16.8, "ISMC 125": 13.1 },
        "Angles": { "ISA 130": 19.7, "ISA 100": 14.9, "ISA 75": 11, "ISA 50": 4.5 },
        "Flats": { "ISF 100": 4.7, "ISF 32": 1.5 },
        "Plates": { "10mm Plate": 78.5, "CH Plate": 53.2 }
    };

    let items = JSON.parse(localStorage.getItem("steel_items")) || [];

    function loadSizes() {
        const c = document.getElementById("cat").value;
        const s = document.getElementById("size");
        s.innerHTML = '<option value="">Select Size</option>';
        if (c) Object.keys(dataRef[c]).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function saveItem() {
        const c = document.getElementById("cat").value;
        const sz = document.getElementById("size").value;
        const l = parseFloat(document.getElementById("len").value) || 0;
        const w = parseFloat(document.getElementById("wid").value) || 0;
        const a = parseFloat(document.getElementById("are").value) || 0;
        const idx = parseInt(document.getElementById("editIdx").value);

        if(!c || !sz) return alert("ദയവായി വിവരങ്ങൾ നൽകുക");

        const uw = dataRef[c][sz];
        const wt = (c === "Plates") ? (a > 0 ? a * uw : (l * w / 1000000) * uw) : (l / 1000) * uw;
        
        const obj = { c, sz, l, w, a, wt: wt.toFixed(2) };
        if(idx === -1) items.push(obj); else items[idx] = obj;

        localStorage.setItem("steel_items", JSON.stringify(items));
        resetForm();
        refresh();
    }

    function refresh() {
        const lb = document.getElementById("list");
        lb.innerHTML = "";
        let total = 0;
        items.forEach((item, i) => {
            total += parseFloat(item.wt);
            lb.innerHTML += `<tr>
                <td><strong>${item.sz}</strong><br><small>${item.c} | L: ${item.l}mm</small></td>
                <td>${item.wt} kg</td>
                <td class="actions">
                    <button class="action-btn" style="color:var(--accent)" onclick="edit(${i})"><i class="fas fa-edit"></i></button>
                    <button class="action-btn" style="color:var(--danger)" onclick="del(${i})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        document.getElementById("tCount").innerText = items.length;
        document.getElementById("tWeight").innerText = total.toFixed(2);
    }

    function edit(i) {
        const itm = items[i];
        document.getElementById("cat").value = itm.c;
        loadSizes();
        document.getElementById("size").value = itm.sz;
        document.getElementById("len").value = itm.l;
        document.getElementById("wid").value = itm.w;
        document.getElementById("are").value = itm.a;
        document.getElementById("editIdx").value = i;
        document.getElementById("btnLbl").innerText = "Update";
    }

    function del(i) { if(confirm("Delete ചെയ്യണോ?")) { items.splice(i,1); localStorage.setItem("steel_items", JSON.stringify(items)); refresh(); } }

    function resetForm() {
        document.getElementById("editIdx").value = "-1";
        document.getElementById("btnLbl").innerText = "Save";
        document.getElementById("len").value = ""; document.getElementById("wid").value = ""; document.getElementById("are").value = "";
    }

    async function handlePDF(type, mode) {
        if(items.length === 0) return alert("ലിസ്റ്റിൽ ഡാറ്റ ഇല്ല!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(16);
        doc.text("Steel Material Estimate Report", 14, 20);
        doc.setFontSize(10);
        doc.text(`Date: ${new Date().toLocaleString()}`, 14, 28);

        const rows = items.map(it => [it.c, it.sz, it.l, it.wt + " kg"]);
        doc.autoTable({
            head: [['Category', 'Size', 'Length', 'Weight']],
            body: rows,
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [44, 62, 80] }
        });

        const total = items.reduce((s, it) => s + parseFloat(it.wt), 0);
        doc.text(`Grand Total: ${total.toFixed(2)} kg`, 14, doc.lastAutoTable.finalY + 10);

        if(mode === 'share') {
            const blob = doc.output('blob');
            const file = new File([blob], "Steel_Estimate.pdf", { type: "application/pdf" });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Steel Estimate',
                        text: 'Sharing the steel weight estimation report.'
                    });
                } catch (e) { console.error("Sharing failed", e); }
            } else {
                alert("ഈ ബ്രൗസറിൽ ഷെയറിങ് സപ്പോർട്ട് ചെയ്യുന്നില്ല. ഡൗൺലോഡ് ഉപയോഗിക്കുക.");
            }
        } else {
            doc.save("Steel_Estimate.pdf");
        }
    }

    refresh();
</script>
</body>
</html>
