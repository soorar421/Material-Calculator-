<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Log Manager</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; flex: 1; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 25px; text-align: center; }
        .site-banner { background: #fffde7; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; color: #f57f17; border-bottom: 3px solid #fbc02d; text-transform: uppercase; letter-spacing: 1px; }
        .section-card { margin: 15px; padding: 20px; border-radius: 15px; background: #fff; border: 1px solid #e0e0e0; position: relative; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; outline: none; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button:active { transform: scale(0.97); }
        .btn-main { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .summary-card { background: linear-gradient(135deg, #e3f2fd, #bbdefb); margin: 15px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); }
        .total-label { font-size: 14px; font-weight: bold; color: #1565c0; }
        .total-value { font-size: 26px; font-weight: bold; color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 12px; color: #70757a; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-circle { width: 36px; height: 36px; border-radius: 50%; padding: 0; display: inline-flex; }
        .area-badge { background: #e8f0fe; color: #1a73e8; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; display: inline-block; margin-bottom: 5px; border: 1px solid #1a73e8; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .footer-credit { text-align: center; padding: 20px; font-size: 12px; color: #70757a; font-weight: bold; letter-spacing: 1px; }
        .photo-link { color: #1a73e8; text-decoration: none; font-size: 11px; font-weight: bold; display: block; margin-top: 5px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary);"></i>
    <p style="margin-top: 10px; font-weight: bold;">Uploading Photo... Please wait</p>
</div>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-boxes"></i> MATERIAL MANAGER</h1>
    </div>

    <div id="login-section" style="padding: 100px 20px; text-align: center;">
        <button class="btn-main" onclick="login()" style="width: auto; padding: 15px 45px; font-size: 18px; border-radius: 50px;"><i class="fab fa-google"></i> Login to Manager</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="site-banner" id="site-header-text">NO SITE SELECTED</div>

        <div style="padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #eceff1; border-bottom: 1px solid #cfd8dc;">
            <span id="user-display" style="font-size: 13px; font-weight: bold; color: #455a64;"></span>
            <button onclick="logout()" class="btn-red" style="width: auto; padding: 5px 12px; margin: 0; font-size: 11px; border-radius: 5px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="summary-card">
            <div class="total-label"><i class="fas fa-weight-hanging"></i> TOTAL MATERIAL WEIGHT</div>
            <div class="total-value" id="grand-total">0.00 KG</div>
        </div>

        <div class="section-card">
            <input type="text" id="site-name-input" placeholder="Type Site/Project Name..." style="border: 2px solid var(--primary); text-align: center; font-weight: bold; font-size: 18px;" oninput="updateSiteName()">
        </div>

        <div class="section-card" style="border-top: 4px solid var(--primary);">
            <div class="section-title"><i class="fas fa-box-open"></i> Add Material Entry</div>
            <input type="date" id="mat-date">
            
            <div class="flex-row">
                <input type="text" id="mat-area" placeholder="Area Name (eg: Area A)">
                <select id="mat-direction">
                    <option value="">Select Direction</option>
                    <option value="North">North</option>
                    <option value="South">South</option>
                    <option value="East">East</option>
                    <option value="West">West</option>
                    <option value="Center">Center</option>
                </select>
            </div>
            
            <div style="background: #f1f3f4; padding: 10px; border-radius: 10px; margin-bottom: 8px;">
                <label style="font-size: 12px; color: #5f6368; font-weight: bold; display: block; margin-bottom: 5px;"><i class="fas fa-camera"></i> Attach Material Photo (Optional)</label>
                <input type="file" id="mat-photo" accept="image/*" style="padding: 5px; font-size: 12px; background: white;">
            </div>

            <select id="mat-type" onchange="togglePlateInput()">
                <optgroup label="Beams">
                    <option value="46" data-type="linear">ISMB 300 (46 kg/m)</option>
                </optgroup>
                <optgroup label="Channels">
                    <option value="22.3" data-type="linear">ISMC 200 (22.3 kg/m)</option>
                    <option value="16.8" data-type="linear">ISMC 150 (16.8 kg/m)</option>
                    <option value="13.1" data-type="linear">ISMC 125 (13.1 kg/m)</option>
                </optgroup>
                <optgroup label="Angles">
                    <option value="19.7" data-type="linear">ISA 130 (19.7 kg/m)</option>
                    <option value="14.9" data-type="linear">ISA 100 (14.9 kg/m)</option>
                    <option value="11" data-type="linear">ISA 75 (11 kg/m)</option>
                    <option value="4.5" data-type="linear">ISA 50 (4.5 kg/m)</option>
                </optgroup>
                <optgroup label="Flats">
                    <option value="4.7" data-type="linear">ISF 100 (4.7 kg/m)</option>
                    <option value="1.5" data-type="linear">ISF 32 (1.5 kg/m)</option>
                </optgroup>
                <optgroup label="Plates">
                    <option value="78.5" data-type="plate">10mm Plate (78.5 kg/sq.m)</option>
                    <option value="53.2" data-type="plate">CH Plate (53.2 kg/sq.m)</option>
                </optgroup>
            </select>
            <div id="plate-width-div" class="hidden"><input type="number" id="mat-width" placeholder="Width in MM"></div>
            <div class="flex-row">
                <input type="number" id="mat-length" placeholder="Length in MM">
                <input type="number" id="mat-qty" placeholder="Quantity" value="1">
            </div>
            <button id="mat-action-btn" class="btn-main" onclick="processMaterial()"><i class="fas fa-plus-circle"></i> Save Material</button>
            
            <div id="mat-grouped-display" style="margin-top: 15px;"></div>
            
            <button class="btn-main" onclick="generateMaterialPDF()" style="margin-top: 15px; font-size: 13px; height: 40px; background: var(--dark);"><i class="fas fa-file-pdf"></i> Export Material PDF Report</button>
        </div>
    </div>
</div>

<div class="footer-credit"><i class="fas fa-code"></i> Developed for Material Management</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
        authDomain: "gsconstructions-3f4c9.firebaseapp.com",
        projectId: "gsconstructions-3f4c9",
        storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
        messagingSenderId: "622430516475",
        appId: "1:622430516475:web:17fd96908472cbd665ec5e"
    };

    const IMGBB_API_KEY = "b48c7ab06cc8ad41b1ec1188653de8be";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentEditMatId = null;
    window.pdfMaterials = [];

    function login() { auth.signInWithPopup(provider); }
    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = "Active User: " + user.displayName;
            document.getElementById('mat-date').value = new Date().toISOString().split('T')[0];
            refreshUI();
        }
    });

    async function uploadToImgBB(file) {
        document.getElementById('loading-overlay').style.display = 'flex';
        let formData = new FormData();
        formData.append("image", file);
        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
            const result = await response.json();
            document.getElementById('loading-overlay').style.display = 'none';
            return result.data.url;
        } catch (error) {
            alert("Photo upload failed!");
            document.getElementById('loading-overlay').style.display = 'none';
            return null;
        }
    }

    async function processMaterial() {
        const date = document.getElementById('mat-date').value;
        const area = document.getElementById('mat-area').value || "General Area";
        const dir = document.getElementById('mat-direction').value;
        const sel = document.getElementById('mat-type');
        const length = parseFloat(document.getElementById('mat-length').value);
        const qty = parseFloat(document.getElementById('mat-qty').value) || 1;
        const photoFile = document.getElementById('mat-photo').files[0];

        if(!length || !date) return alert("Fill all mandatory fields (Date, Length)");

        let photoUrl = "";
        if(photoFile) photoUrl = await uploadToImgBB(photoFile);

        let unitWeight = 0, sizeText = "";
        if(sel.options[sel.selectedIndex].getAttribute('data-type') === 'plate') {
            const width = parseFloat(document.getElementById('mat-width').value);
            if(!width) return alert("Enter width for the plate");
            unitWeight = ((length/1000)*(width/1000)*parseFloat(sel.value));
            sizeText = length + "x" + width + "mm";
        } else {
            unitWeight = ((length/1000)*parseFloat(sel.value));
            sizeText = length + "mm";
        }
        
        const totalWeight = (unitWeight * qty).toFixed(2);
        const data = { date, area, direction: dir, name: sel.options[sel.selectedIndex].text, size: sizeText, qty, weight: parseFloat(totalWeight), photoUrl: photoUrl || "", uid: auth.currentUser.uid, ts: Date.now() };

        if(currentEditMatId) {
            if (!photoFile) delete data.photoUrl; 
            await db.collection('materials').doc(currentEditMatId).update(data);
            currentEditMatId = null;
            document.getElementById('mat-action-btn').innerHTML = '<i class="fas fa-plus-circle"></i> Save Material';
        } else { await db.collection('materials').add(data); }

        document.getElementById('mat-length').value = ""; document.getElementById('mat-width').value = ""; document.getElementById('mat-qty').value = "1"; document.getElementById('mat-photo').value = "";
        refreshUI();
    }

    async function refreshUI() {
        const uid = auth.currentUser.uid;
        document.getElementById('site-name-input').value = localStorage.getItem('gs_pro_site') || "";
        updateSiteName();
        window.pdfMaterials = [];

        const mSnap = await db.collection('materials').where('uid', '==', uid).get();
        let totalW = 0, mAreaGroups = {};
        
        mSnap.forEach(doc => {
            const d = doc.data(); 
            if(!mAreaGroups[d.area]) mAreaGroups[d.area] = [];
            mAreaGroups[d.area].push({id: doc.id, ...d}); 
            totalW += d.weight;
            window.pdfMaterials.push({ date: d.date, area: d.area, direction: d.direction || '-', name: d.name, size: d.size, qty: d.qty, weight: parseFloat(d.weight) });
        });
        
        let mHTML = '';
        Object.keys(mAreaGroups).sort().forEach(area => {
            mHTML += `<div class="area-badge"><i class="fas fa-map-marker-alt"></i> ${area}</div><table><tbody>`;
            mAreaGroups[area].forEach(d => {
                const photoBtn = d.photoUrl ? `<a href="${d.photoUrl}" target="_blank" class="photo-link"><i class="fas fa-image"></i> View Photo</a>` : '';
                let cleanSize = d.size.replace(/mm/g, '').trim();
                const l = cleanSize.split('x')[0], w = cleanSize.split('x')[1] || "";
                mHTML += `<tr><td><strong>${d.name}</strong><br><small>${d.direction || ''} (${formatToDisplayDate(d.date)})</small>${photoBtn}</td>
                <td>${d.size}<br>Qty: ${d.qty}</td><td>${d.weight} kg</td>
                <td><div style="display:flex;gap:5px;">
                <button class="btn-circle btn-main" onclick="editMatEntry('${d.id}','${d.area}','${d.direction}','${l}','${w}','${d.date}','${d.qty}','${d.name}')"><i class="fas fa-pencil-alt"></i></button>
                <button class="btn-circle btn-red" onclick="removeDoc('materials','${d.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
            }); mHTML += `</tbody></table>`;
        });
        
        document.getElementById('mat-grouped-display').innerHTML = mHTML;
        document.getElementById('grand-total').innerText = totalW.toFixed(2) + " KG";
    }

    function formatToDisplayDate(dateStr) { if(!dateStr) return ""; const [y, m, d] = dateStr.split('-'); return `${d}-${m}-${y}`; }
    function togglePlateInput() { const isPlate = document.getElementById('mat-type').options[document.getElementById('mat-type').selectedIndex].getAttribute('data-type') === 'plate'; document.getElementById('plate-width-div').classList.toggle('hidden', !isPlate); }
    function updateSiteName() { const val = document.getElementById('site-name-input').value; document.getElementById('site-header-text').innerText = val || "NO SITE SELECTED"; localStorage.setItem('gs_pro_site', val); }
    async function removeDoc(col, id) { if(confirm("Permanently delete this entry?")) { await db.collection(col).doc(id).delete(); refreshUI(); } }
    
    function editMatEntry(id, area, dir, len, wid, date, qty, name) { 
        currentEditMatId = id; 
        document.getElementById('mat-date').value = date; 
        document.getElementById('mat-area').value = area; 
        document.getElementById('mat-direction').value = dir || ""; 
        document.getElementById('mat-length').value = len; 
        document.getElementById('mat-width').value = wid || ""; 
        document.getElementById('mat-qty').value = qty || 1; 
        const sel = document.getElementById('mat-type'); 
        for(let i=0; i<sel.options.length; i++) { 
            if(sel.options[i].text === name) { sel.selectedIndex = i; break; } 
        } 
        togglePlateInput(); 
        document.getElementById('mat-action-btn').innerHTML = '<i class="fas fa-save"></i> Update Material'; 
        window.scrollTo({ top: document.getElementById('mat-date').offsetTop - 50, behavior: 'smooth' });
    }

    function generateMaterialPDF() {
        if (window.pdfMaterials.length === 0) return alert("No data available to export");
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const site = document.getElementById('site-name-input').value || "Project";
        doc.setFontSize(18); doc.setTextColor(26, 115, 232); doc.text("MATERIAL LOG REPORT", 14, 20);
        doc.setFontSize(11); doc.setTextColor(100); doc.text("Project: " + site + " | Total Weight: " + document.getElementById('grand-total').innerText, 14, 28);
        
        const areaGrouped = {};
        window.pdfMaterials.forEach(m => { 
            if(!areaGrouped[m.area]) areaGrouped[m.area] = []; 
            areaGrouped[m.area].push([formatToDisplayDate(m.date), m.direction, m.name, m.size, m.qty, m.weight.toFixed(2)]); 
        });
        
        let yPos = 35;
        Object.keys(areaGrouped).sort().forEach(area => {
            if(yPos > 240) { doc.addPage(); yPos = 20; }
            doc.setFontSize(12); doc.setTextColor(0); doc.text("Area: " + area, 14, yPos);
            doc.autoTable({ startY: yPos + 2, head: [['Date', 'Dir', 'Item', 'Size', 'Qty', 'Weight (kg)']], body: areaGrouped[area], theme: 'grid', headStyles: { fillColor: [26, 115, 232] }, styles: { fontSize: 8 } });
            yPos = doc.lastAutoTable.finalY + 12;
        });

        const materialSummary = {};
        window.pdfMaterials.forEach(m => {
            if (!materialSummary[m.name]) materialSummary[m.name] = { totalWeight: 0, totalQty: 0 };
            materialSummary[m.name].totalWeight += m.weight;
            materialSummary[m.name].totalQty += parseFloat(m.qty);
        });
        
        const summaryBody = Object.keys(materialSummary).sort().map(name => [name, materialSummary[name].totalQty, materialSummary[name].totalWeight.toFixed(2) + " kg"]);
        if(yPos > 220) { doc.addPage(); yPos = 20; }
        doc.setFontSize(14); doc.setTextColor(26, 115, 232); doc.text("MATERIAL SUMMARY (TOTALS)", 14, yPos);
        doc.autoTable({ startY: yPos + 4, head: [['Material Name', 'Total Quantity', 'Total Weight']], body: summaryBody, theme: 'grid', headStyles: { fillColor: [21, 101, 192] }, styles: { fontSize: 9, fontStyle: 'bold' } });
        
        doc.save(site + "_Material_Log.pdf");
    }
</script>
</body>
</html>
