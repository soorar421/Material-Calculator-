<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Log Manager Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; min-height: 100vh; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 20px; text-align: center; }
        .site-banner { background: #fffde7; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; color: #f57f17; border-bottom: 3px solid #fbc02d; text-transform: uppercase; }
        .section-card { margin: 15px; padding: 20px; border-radius: 15px; background: #fff; border: 1px solid #e0e0e0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-red { background: var(--danger); color: white; border: none; font-weight: bold; cursor: pointer; }
        .summary-card { background: #e3f2fd; margin: 15px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); }
        .total-value { font-size: 24px; font-weight: bold; color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .area-badge { background: #e8f0fe; color: #1a73e8; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-top: 15px; display: inline-block; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 10px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary);"></i>
    <p>Processing... Please wait</p>
</div>

<div class="container">
    <div class="header"><h1><i class="fas fa-boxes"></i> MATERIAL MANAGER</h1></div>

    <div id="login-section" style="padding: 100px 20px; text-align: center;">
        <button class="btn-main" onclick="login()"><i class="fab fa-google"></i> Login with Google</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="site-banner" id="site-header-text">SELECT SITE</div>
        
        <div style="padding: 10px 15px; display: flex; justify-content: space-between; background: #eceff1;">
            <span id="user-display" style="font-size: 12px; font-weight: bold;"></span>
            <button onclick="logout()" class="btn-red" style="width: auto; padding: 5px 10px; font-size: 11px;">Logout</button>
        </div>

        <div class="summary-card">
            <div style="font-size: 14px; font-weight: bold;">TOTAL WEIGHT</div>
            <div class="total-value" id="grand-total">0.00 KG</div>
        </div>

        <div class="section-card">
            <input type="text" id="site-name-input" placeholder="Project Name" oninput="updateSiteName()">
        </div>

        <div class="section-card">
            <input type="date" id="mat-date">
            <div class="flex-row">
                <input type="text" id="mat-area" placeholder="Area (e.g. Area A)">
                <select id="mat-direction">
                    <option value="">Direction</option>
                    <option value="North">North</option>
                    <option value="South">South</option>
                    <option value="East">East</option>
                    <option value="West">West</option>
                </select>
            </div>
            
            <input type="file" id="mat-photo" accept="image/*">

            <select id="mat-type" onchange="togglePlateInput()">
                <option value="46">ISMB 300 (46 kg/m)</option>
                <option value="22.3">ISMC 200 (22.3 kg/m)</option>
                <option value="19.7">ISA 130 (19.7 kg/m)</option>
                <option value="78.5" data-type="plate">10mm Plate (78.5 kg/sq.m)</option>
            </select>
            
            <div id="plate-width-div" class="hidden"><input type="number" id="mat-width" placeholder="Width in MM"></div>
            <div class="flex-row">
                <input type="number" id="mat-length" placeholder="Length in MM">
                <input type="number" id="mat-qty" value="1">
            </div>
            
            <button id="mat-action-btn" class="btn-main" onclick="processMaterial()">SAVE MATERIAL</button>
            
            <div id="mat-grouped-display"></div>
            
            <button class="btn-main" onclick="generateMaterialPDF()" style="background: #333; margin-top: 20px;">GENERATE PDF REPORT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDRDLw2bE_iG7OuE6diCGtrLmDePZStKr8",
        authDomain: "gsconstructions-3f4c9.firebaseapp.com",
        projectId: "gsconstructions-3f4c9",
        storageBucket: "gsconstructions-3f4c9.firebasestorage.app",
        messagingSenderId: "622430516475",
        appId: "1:622430516475:web:17fd96908472cbd665ec5e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.displayName;
            document.getElementById('mat-date').value = new Date().toISOString().split('T')[0];
            refreshUI();
        }
    });

    function login() { auth.signInWithPopup(provider).catch(e => alert(e.message)); }
    function logout() { auth.signOut().then(() => location.reload()); }

    async function processMaterial() {
        const btn = document.getElementById('mat-action-btn');
        const loader = document.getElementById('loading-overlay');
        
        try {
            const date = document.getElementById('mat-date').value;
            const area = document.getElementById('mat-area').value || "General";
            const length = parseFloat(document.getElementById('mat-length').value);
            const qty = parseFloat(document.getElementById('mat-qty').value) || 1;
            
            if(!length || !date) return alert("Date and Length are required!");
            
            loader.style.display = 'flex';
            btn.disabled = true;

            const sel = document.getElementById('mat-type');
            let unitWeight = 0, sizeText = "";
            
            if(sel.options[sel.selectedIndex].getAttribute('data-type') === 'plate') {
                const width = parseFloat(document.getElementById('mat-width').value);
                unitWeight = ((length/1000)*(width/1000)*parseFloat(sel.value));
                sizeText = length + "x" + width + "mm";
            } else {
                unitWeight = ((length/1000)*parseFloat(sel.value));
                sizeText = length + "mm";
            }

            const data = {
                date, area, 
                direction: document.getElementById('mat-direction').value,
                name: sel.options[sel.selectedIndex].text,
                size: sizeText, qty,
                weight: parseFloat((unitWeight * qty).toFixed(2)),
                uid: auth.currentUser.uid,
                ts: Date.now()
            };

            await db.collection('materials').add(data);
            
            document.getElementById('mat-length').value = "";
            document.getElementById('mat-width').value = "";
            alert("Saved Successfully!");
            refreshUI();
        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }

    async function refreshUI() {
        const uid = auth.currentUser.uid;
        document.getElementById('site-name-input').value = localStorage.getItem('gs_pro_site') || "";
        updateSiteName();
        window.pdfMaterials = [];

        // Removed orderBy('ts') to ensure old data without timestamps shows up
        const mSnap = await db.collection('materials').where('uid', '==', uid).get();
        
        let totalW = 0, mAreaGroups = {};
        mSnap.forEach(doc => {
            const d = doc.data();
            if(!mAreaGroups[d.area]) mAreaGroups[d.area] = [];
            mAreaGroups[d.area].push({id: doc.id, ...d});
            totalW += d.weight;
            window.pdfMaterials.push(d);
        });

        let mHTML = '';
        Object.keys(mAreaGroups).sort().forEach(area => {
            mHTML += `<div class="area-badge">${area}</div><table>`;
            mAreaGroups[area].forEach(d => {
                mHTML += `<tr><td><b>${d.name}</b><br>${d.size} (Qty: ${d.qty})</td>
                <td style="text-align:right"><b>${d.weight} kg</b><br>
                <i class="fas fa-trash" style="color:red" onclick="deleteEntry('${d.id}')"></i></td></tr>`;
            });
            mHTML += `</table>`;
        });
        document.getElementById('mat-grouped-display').innerHTML = mHTML;
        document.getElementById('grand-total').innerText = totalW.toFixed(2) + " KG";
    }

    async function deleteEntry(id) {
        if(confirm("Delete this entry?")) {
            await db.collection('materials').doc(id).delete();
            refreshUI();
        }
    }

    function updateSiteName() {
        const val = document.getElementById('site-name-input').value;
        document.getElementById('site-header-text').innerText = val || "SELECT SITE";
        localStorage.setItem('gs_pro_site', val);
    }

    function togglePlateInput() {
        const isPlate = document.getElementById('mat-type').options[document.getElementById('mat-type').selectedIndex].getAttribute('data-type') === 'plate';
        document.getElementById('plate-width-div').classList.toggle('hidden', !isPlate);
    }

    function generateMaterialPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const site = document.getElementById('site-name-input').value || "Project";
        
        doc.text("MATERIAL REPORT: " + site, 14, 20);
        
        const rows = window.pdfMaterials.map(m => [m.date, m.name, m.size, m.qty, m.weight + " kg"]);
        doc.autoTable({
            startY: 30,
            head: [['Date', 'Item', 'Size', 'Qty', 'Weight']],
            body: rows
        });
        
        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFont(undefined, 'bold');
        doc.text("GRAND TOTAL: " + document.getElementById('grand-total').innerText, 14, finalY);
        doc.save(site + "_Report.pdf");
    }
</script>

<link rel="manifest" href='data:application/json,{"name":"MaterialManager","short_name":"MatMgr","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#1a73e8","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/583/583374.png","sizes":"512x512","type":"image/png"}]}'>

</body>
</html>
